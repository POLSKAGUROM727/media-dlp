version: "3.9"

services:
  yt2mp3:
    build: .
    container_name: yt2mp3
    restart: unless-stopped
    ports:
      - "7474:5000"          # Access via http://your-unraid-ip:7474
    volumes:
      - /mnt/user/media/Music:/downloads   # ← Change to your Unraid share path
    environment:
      - DOWNLOAD_DIR=/downloads
    # Optional: run as your Unraid user to avoid permission issues
    # user: "99:100"         # nobody:users (Unraid default)
